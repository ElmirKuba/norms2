<header class="bar">
  <a class="brand" routerLink="/app">Нормисы</a>

  <nav class="nav">
    @for (item of nav; track item.path) {
      <a [routerLink]="item.path" routerLinkActive="active">{{ item.label }}</a>
    }
  </nav>

  <div class="right">
    <app-notification-bell />
    <app-theme-toggle />
    @if (authStore.account(); as me) {
      <div class="account">
        <button type="button" class="account-btn" (click)="toggleMenu()" [attr.aria-expanded]="menuOpen()">
          {{ me.alias }} <span class="caret" aria-hidden="true">▾</span>
        </button>
        @if (menuOpen()) {
          <button type="button" class="backdrop" aria-label="Закрыть меню" (click)="closeMenu()"></button>
          <div class="menu" role="menu">
            <a routerLink="profile" (click)="closeMenu()">Профиль</a>
            <a routerLink="settings" (click)="closeMenu()">Настройки</a>
            <button type="button" (click)="logout()">Выйти</button>
            <div class="menu__sep" role="separator"></div>
            <a routerLink="/about" target="_blank" rel="noopener" (click)="closeMenu()">О проекте</a>
            <a routerLink="/terms" target="_blank" rel="noopener" (click)="closeMenu()">Условия использования</a>
            <a routerLink="/privacy" target="_blank" rel="noopener" (click)="closeMenu()">Политика конфиденциальности</a>
            <p class="menu__version">Нормисы · v{{ version }}</p>
          </div>
        }
      </div>
    }
  </div>
</header>

<main class="content">
  <router-outlet />
</main>
