# nginx для SPA Angular: любая неизвестная маршрутом ссылка отдаёт index.html
# (history API роутинга), статика кэшируется. Проксирование /api — на бэкенд
# в проде делает Traefik (см. docker-compose.prod.yml), не nginx.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # History-fallback: SPA сама разбирает путь.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Долгий кэш для хэшированных ассетов.
  location ~* \.(?:js|css|woff2?|png|jpe?g|svg|ico|webp)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
