# Dev-окружение «Нормисов». Запуск (из корня репозитория):
#   make dev-up
# Makefile вычисляет и экспортирует PROJECT_ROOT (корень репо), поэтому пути ниже
# абсолютные — ${PROJECT_ROOT}/docker/... — а не хрупкие ./../.. . Прямой вызов
# docker compose без make требует заранее: export PROJECT_ROOT=$(pwd).
#
# Весь стек поднимается одной командой `make dev-rebuild` (или `make dev-up`):
# postgres + pgAdmin + nest + angular. Бэк и фронт — в watch-режиме с монтированием
# src (`nest/src`, `angular/src`) → hot-reload без пересборки образа (пересборка
# нужна только при смене зависимостей/Dockerfile). Можно по-прежнему гонять nest/
# angular на хосте, если нужно, — но дефолт теперь «всё в докере».

services:
  # ── PostgreSQL ──
  postgres:
    container_name: norms2_postgres_dev
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ${PROJECT_ROOT}/docker/volumes/pg_data:/var/lib/postgresql/data
      - ${PROJECT_ROOT}/docker/sql-files/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - '${DB_PORT}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - norms2_dev-net

  # ── pgAdmin (веб-UI для Postgres) ──
  pgadmin:
    container_name: norms2_pgadmin_dev
    image: dpage/pgadmin4
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - ${PROJECT_ROOT}/docker/volumes/pgadmin_data:/var/lib/pgadmin
      # Авто-регистрация сервера БД при старте (pgAdmin импортит этот путь сам).
      # Пароль (norms2) вводится один раз и сохраняется в pgadmin_data.
      - ${PROJECT_ROOT}/docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    ports:
      - '${PGADMIN_PORT}:80'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - norms2_dev-net

  # ── NestJS backend (watch-режим, монтируем src) ──
  nest:
    container_name: norms2_nest_dev
    build:
      context: ${PROJECT_ROOT}
      dockerfile: docker/dockerfiles/nest-backend/Dockerfile.development
    restart: unless-stopped
    env_file:
      - ${PROJECT_ROOT}/.env
    environment:
      DB_HOST: norms2_postgres_dev   # внутри сети — имя контейнера, не localhost
      CHOKIDAR_USEPOLLING: 'true'    # надёжный hot-reload по смонтированному src
    volumes:
      - ${PROJECT_ROOT}/nest/src:/app/src:rw
      # Загруженный контент (аватары и пр., CONTENT_DIR=content → /app/content).
      # Bind-mount, чтобы файлы ПЕРЕЖИВАЛИ dev-rebuild/пересоздание контейнера и
      # были видны на хосте. Папка в .gitignore (docker/volumes/*) — в git не идёт.
      - ${PROJECT_ROOT}/docker/volumes/content:/app/content:rw
      # .git (ro) — бэк читает текущий HEAD живьём для GET /version (ADR-0044):
      # в dev SHA отражает реальный checkout рабочего дерева и меняется сразу после
      # git checkout, без пересоздания контейнера. В проде .git нет — там GIT_COMMIT
      # из build ARG (D1).
      - ${PROJECT_ROOT}/.git:/app/.git:ro
      # package.json (ro) — версия бэка в GET /version из исходника, а не из запечённой
      # в образ копии (иначе bump версии не виден без dev-rebuild).
      - ${PROJECT_ROOT}/nest/package.json:/app/package.json:ro
      # Авторские seed-файлы релиз-нот (ro) — сид копирует их в content/ при старте (F7).
      - ${PROJECT_ROOT}/nest/seed-content:/app/seed-content:ro
    ports:
      - '${BACKEND_PORT}:3000'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - norms2_dev-net

  # ── Angular frontend (dev-server, watch, монтируем src) ──
  angular:
    container_name: norms2_angular_dev
    build:
      context: ${PROJECT_ROOT}
      dockerfile: docker/dockerfiles/angular-frontend/Dockerfile.development
    restart: unless-stopped
    volumes:
      - ${PROJECT_ROOT}/angular/src:/app/src:rw
      # package.json (ro) — frontendVersion в бандле берётся из исходника, а не из
      # запечённой в образ копии (ADR-0044: иначе bump версии фронта не виден без rebuild).
      - ${PROJECT_ROOT}/angular/package.json:/app/package.json:ro
    ports:
      - '${FRONTEND_PORT}:4200'
    depends_on:
      - nest
    networks:
      - norms2_dev-net

networks:
  norms2_dev-net:
    name: norms2_dev-net
