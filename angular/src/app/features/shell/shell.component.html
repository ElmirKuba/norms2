<header class="bar">
  <a class="brand" routerLink="/app">Нормисы</a>

  <nav class="nav">
    @for (item of nav; track item.path) {
      <a [routerLink]="item.path" routerLinkActive="active">{{ item.label }}</a>
    }
  </nav>

  <div class="right">
    <app-theme-toggle />
    @if (authStore.account(); as me) {
      <span class="who">{{ me.alias }}</span>
    }
    <app-button variant="ghost" (click)="logout()">Выйти</app-button>
  </div>
</header>

<main class="content">
  <router-outlet />
</main>
