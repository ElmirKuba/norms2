# Prod-окружение «Нормисов» — ЧЕРНОВИК этапа D1 (см. docs/deployment.md).
# Traefik терминирует TLS (Let's Encrypt/ACME) и роутит по доменам; БД наружу
# не публикуется. Финализируется при настройке VPS: домен, ACME-почта, секреты
# (только из защищённого .env на сервере, не из репозитория). Запуск:
#   make prod-up   (Makefile экспортирует PROJECT_ROOT — корень репо)
#
# Пути абсолютны через ${PROJECT_ROOT}. Drizzle-миграции прогоняются ОТДЕЛЬНЫМ
# шагом до старта nest (auto-push запрещён, ADR-0030) — см. docs/deployment.md.

# Явное имя проекта — иначе берётся из имени папки (compose-files) и совпадает с
# dev-compose → коллизия сервисов. Раздельные имена изолируют dev и prod.
name: norms2_prod

services:
  # ── Reverse-proxy + авто-TLS ──
  traefik:
    container_name: norms2_traefik_prod
    image: traefik:v3.3
    restart: unless-stopped
    command:
      # File-провайдер (не docker): маршруты из dynamic/, без доступа к docker.sock
      # (безопаснее + не зависит от версии docker-API демона).
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # HTTP → HTTPS
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      # TLS по умолчанию для всех websecure-роутеров: серт ${DOMAIN} через ACME
      # (локально ACME не выпишет example.com → Traefik отдаёт self-signed).
      - --entrypoints.websecure.http.tls=true
      - --entrypoints.websecure.http.tls.certResolver=le
      - --entrypoints.websecure.http.tls.domains[0].main=${DOMAIN}
      # Let's Encrypt (TLS-ALPN)
      - --certificatesresolvers.le.acme.tlschallenge=true
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ${PROJECT_ROOT}/docker/traefik/dynamic:/etc/traefik/dynamic:ro
      - ${PROJECT_ROOT}/docker/volumes/letsencrypt:/letsencrypt
    networks:
      - norms2_prod-net

  # ── PostgreSQL (без публикации портов наружу) ──
  postgres:
    container_name: norms2_postgres_prod
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ${PROJECT_ROOT}/docker/volumes/pg_data_prod:/var/lib/postgresql/data
      - ${PROJECT_ROOT}/docker/sql-files/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - norms2_prod-net

  # ── One-shot миграции: drizzle-orm/migrator ДО старта nest (ADR-0030, D1.2) ──
  # Тот же образ, что nest (image: norms2_nest_prod), но command — мигратор; БД
  # не опубликована наружу, поэтому мигрируем изнутри сети. Отрабатывает и выходит.
  migrate:
    container_name: norms2_migrate_prod
    image: norms2_nest_prod
    command: ['node', 'dist/migrate.js']
    restart: 'no'
    env_file:
      - ${PROJECT_ROOT}/.env
    environment:
      NODE_ENV: production
      DB_HOST: norms2_postgres_prod
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - norms2_prod-net

  # ── NestJS backend (API /api + статика /content — same-origin path-based) ──
  nest:
    container_name: norms2_nest_prod
    image: norms2_nest_prod
    build:
      context: ${PROJECT_ROOT}
      dockerfile: docker/dockerfiles/nest-backend/Dockerfile.production
      args:
        # git-SHA билда для GET /version (ADR-0044); Makefile экспортит GIT_COMMIT.
        GIT_COMMIT: ${GIT_COMMIT:-}
    restart: unless-stopped
    env_file:
      - ${PROJECT_ROOT}/.env
    environment:
      NODE_ENV: production
      DB_HOST: norms2_postgres_prod
    volumes:
      # Загруженный контент (аватары и пр., CONTENT_DIR=content → /app/content) —
      # ПЕРСИСТЕНТНО, иначе аватары теряются при пересоздании контейнера. Релиз-ноты
      # сид докопирует сюда при старте (seed-content в образе, ADR-0031/F7).
      - ${PROJECT_ROOT}/docker/volumes/content:/app/content:rw
    # Маршрутизация — в Traefik file-провайдере (docker/traefik/dynamic/routes.yml):
    # /api и /content → этот сервис (norms2_nest_prod:3000). Лейблы не нужны.
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - norms2_prod-net

  # ── Angular frontend (статика nginx; раздаётся как SPA) ──
  angular:
    container_name: norms2_angular_prod
    build:
      context: ${PROJECT_ROOT}
      dockerfile: docker/dockerfiles/angular-frontend/Dockerfile.production
    restart: unless-stopped
    # Маршрутизация — в Traefik file-провайдере: весь трафик кроме /api и /content
    # → этот сервис (norms2_angular_prod:80, SPA history-fallback в nginx).
    depends_on:
      - nest
    networks:
      - norms2_prod-net

networks:
  norms2_prod-net:
    name: norms2_prod-net
